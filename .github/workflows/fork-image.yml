name: Fork Image (GHCR)

# Builds and publishes this fork's Docker image to GitHub Container Registry.
#
# Trigger by pushing a tag like `fork-v0.95.0-1` (base upstream version + fork
# iteration). The image is published as:
#   ghcr.io/sawii00/docmost:fork-v0.95.0-1   (immutable, = the git tag)
#   ghcr.io/sawii00/docmost:fork-latest      (moving, newest fork build)
#
# Notes vs upstream release.yml:
#   - Pushes to GHCR with the built-in GITHUB_TOKEN (no Docker Hub / app-token secrets).
#   - Checks out WITHOUT the private `apps/server/src/ee` submodule (docmost/ee is
#     inaccessible to the fork); the fork ships native replacements, so the build
#     is self-contained — same as the local docker build.

on:
  push:
    tags:
      - 'fork-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag to publish (e.g. fork-v0.95.0-1)'
        required: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/sawii00/docmost

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout (no submodules — private ee/ is not needed)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=fork-latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect published image
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:fork-latest
